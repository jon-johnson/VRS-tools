<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRS Sailing Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#03101f; --bg2:#071829; --bg3:#0a1f33;
  --surface:#0d2540; --surface2:#112d4a;
  --border:#1a3a55; --border2:#245070;
  --teal:#00e5cc; --teal2:#00b8a4; --teal3:#006655;
  --text:#c8dff0; --text2:#7aadcc; --text3:#3d6e8a;
  --white:#eaf5ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo svg { width: 28px; height: 28px; flex-shrink: 0; }
.logo-text {
  font-family: 'Orbitron', monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--teal);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.logo-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.08em;
  margin-top: 2px;
}
.tactical-btn {
  background: var(--teal);
  color: var(--bg);
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 9px 18px;
  border-radius: 6px;
  text-decoration: none;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 7px;
}
.tactical-btn:hover { background: var(--teal2); }

/* ── MAIN ── */
main {
  max-width: 1000px;
  margin: 0 auto;
  padding: 36px 24px 60px;
}

/* ── PAGE TITLE ── */
.page-title {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 24px;
}
.page-title::after {
  content: '';
  display: block;
  height: 1px;
  background: var(--border);
  margin-top: 10px;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.filter-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text3);
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 7px 16px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--teal2); color: var(--teal2); }
.filter-btn.active {
  background: var(--teal);
  border-color: var(--teal);
  color: var(--bg);
}

/* ── CLASS SECTION ── */
.class-section { margin-bottom: 40px; }

.class-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.class-name {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--teal);
}
.class-count {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 3px;
}

/* ── EVENT GRID ── */
.event-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.event-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  overflow: hidden;
}
.event-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--teal3);
  transition: background 0.15s;
}
.event-card:hover {
  border-color: var(--border2);
  background: var(--surface2);
}
.event-card:hover::before { background: var(--teal); }

.event-name {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  line-height: 1.3;
}
.event-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}
.event-meta-item {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 4px;
}
.event-races {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 2px;
}
.race-pill {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text3);
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: 0.05em;
}

/* ── STATES ── */
.state-msg {
  font-family: 'Share Tech Mono', monospace;
  color: var(--text3);
  font-size: 12px;
  padding: 40px 0;
  text-align: center;
  letter-spacing: 0.08em;
}
.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid var(--border);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 3 L14 24" stroke="#00e5cc" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M14 4 L3 22 L14 22 Z" fill="#00e5cc" opacity="0.65"/>
      <path d="M14 7 L23 20 L14 20 Z" fill="#00e5cc" opacity="0.35"/>
      <path d="M5 26 L23 26" stroke="#00e5cc" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="logo-text">VRS Sailing Tools</div>
      <div class="logo-sub">Vakaros RaceSense Analytics</div>
    </div>
  </div>
  <a href="tactical/tactical.html" class="tactical-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
    Live Tactical
  </a>
</header>

<main>
  <div class="page-title">Event Directory</div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-class="all">All Classes</button>
  </div>

  <div id="eventDirectory">
    <div class="state-msg"><span class="spinner"></span>Loading events…</div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyC6840waRqWQP8K3nAHVdbL-Lyh_FuAZ6A",
  authDomain: "vrs-sailing-tools.firebaseapp.com",
  projectId: "vrs-sailing-tools",
  storageBucket: "vrs-sailing-tools.firebasestorage.app",
  messagingSenderId: "1075889442099",
  appId: "1:1075889442099:web:37cdef2784422790cb0246"
});
const db = getFirestore(app);

async function loadEvents() {
  const snap = await getDocs(query(collection(db, 'events'), orderBy('date', 'desc')));
  const events = [];
  snap.forEach(doc => events.push({ id: doc.id, ...doc.data() }));
  return events;
}

async function render() {
  const dir = document.getElementById('eventDirectory');
  const filterBar = document.getElementById('filterBar');
  let activeClass = 'all';

  let events;
  try {
    events = await loadEvents();
  } catch(e) {
    dir.innerHTML = `<div class="state-msg">Unable to load events — check Firestore rules.</div>`;
    return;
  }

  if (!events.length) {
    dir.innerHTML = `<div class="state-msg">No events yet.</div>`;
    return;
  }

  // Build class filter buttons
  const classes = [...new Set(events.map(e => e.class).filter(Boolean))].sort();
  for (const cls of classes) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.class = cls;
    btn.textContent = cls.toUpperCase();
    filterBar.appendChild(btn);
  }

  filterBar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeClass = btn.dataset.class;
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderDirectory(events, activeClass);
  });

  renderDirectory(events, activeClass);
}

function renderDirectory(events, activeClass) {
  const dir = document.getElementById('eventDirectory');
  const filtered = activeClass === 'all' ? events : events.filter(e => e.class === activeClass);

  if (!filtered.length) {
    dir.innerHTML = `<div class="state-msg">No events for this class yet.</div>`;
    return;
  }

  // Group by class
  const byClass = {};
  for (const ev of filtered) {
    const cls = ev.class ?? 'Unknown';
    if (!byClass[cls]) byClass[cls] = [];
    byClass[cls].push(ev);
  }

  dir.innerHTML = Object.entries(byClass).map(([cls, evs]) => `
    <div class="class-section">
      <div class="class-header">
        <span class="class-name">${cls}</span>
        <span class="class-count">${evs.length} event${evs.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="event-grid">${evs.map(ev => eventCard(ev)).join('')}</div>
    </div>
  `).join('');
}

function eventCard(ev) {
  const racesHtml = (ev.races ?? []).map((r, i) =>
    `<span class="race-pill">R${i+1}${r.label ? ' · ' + r.label : ''}</span>`
  ).join('');

  const dateStr = ev.date
    ? (() => {
        try {
          const d = ev.date.seconds ? new Date(ev.date.seconds * 1000) : new Date(ev.date);
          return d.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
        } catch(e) { return ev.date; }
      })()
    : '';

  const href = ev.report_url ?? `events/${(ev.class ?? '').toLowerCase()}/${ev.file ?? '#'}`;

  return `
    <a class="event-card" href="${href}">
      <div class="event-name">${ev.name ?? 'Unnamed Event'}</div>
      <div class="event-meta">
        ${dateStr ? `<span class="event-meta-item">📅 ${dateStr}</span>` : ''}
        ${ev.venue ? `<span class="event-meta-item">📍 ${ev.venue}</span>` : ''}
        ${ev.races?.length ? `<span class="event-meta-item">🏁 ${ev.races.length} races</span>` : ''}
      </div>
      ${racesHtml ? `<div class="event-races">${racesHtml}</div>` : ''}
    </a>
  `;
}

render();
</script>
</body>
</html>
