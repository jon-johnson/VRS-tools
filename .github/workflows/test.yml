name: Test

on:
  pull_request:
  push:
    branches:
      - analysis-engine-refactor
      - main

jobs:
  node-tests:
    name: Node tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test
